name: edumaster_ia
description: "Plateforme d'apprentissage avec monétisation via téléchargements, consommation de données et paiements."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.13.0
  firebase_storage: ^11.5.0
  device_info_plus: ^9.1.0
  package_info_plus: ^4.2.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  http: ^1.1.0
  google_mobile_ads: ^3.0.0
  youtube_player_flutter: ^8.1.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
    - lib/assets/pdfs/
    - lib/assets/videos/
